# ===============================
# Forex Daily RL Experiment
# Cost = 3.0 bps
# ===============================

symbol: "EURUSD=X"
start: "2010-01-01"
end: null
interval: "1d"

# Trading costs
cost_bps: 3.0
slippage_bps: 0.0
initial_cash: 10000

seed: 42

# ===============================
# RL SETTINGS
# ===============================

rl_split_date: "2019-01-01"

# Training
rl_train_timesteps: 100000
rl_lr: 0.0003
rl_n_steps: 2048
rl_batch_size: 64
rl_gamma: 0.99
rl_gae_lambda: 0.95
rl_ent_coef: 0.0
rl_reward_scale: 1.0

# Episode settings
rl_max_episode_steps: 0   # 0 = full dataset episode

# Model path (separate from cost0)
rl_model_path: "reports/rl/ppo_model_cost3.zip"

# Feature set
rl_feature_cols:
  - return_1
  - return_3
  - return_5
  - return_1_lag1
  - return_1_lag2
  - return_1_lag3
  - return_1_lag5
  - vol_10
  - vol_20
  - vol_60
  - vol_percentile_252
  - ma_ratio_10_20
  - ma_ratio_20_50
  - rsi

strategies:
  ma_crossover:
    fast: 20
    slow: 50