symbol: "EURUSD=X"
start: "2010-01-01"
end: null
interval: "1d"

ml_train_size: 1000
ml_test_size: 250
ml_min_train: 500
ml_proba_threshold: 0.6

seed: 42
ml_model: "rf"

ml_thresholds: [0.50, 0.52, 0.55, 0.60, 0.65, 0.70]

cost_bps: 1.5        # transaction cost per trade side (in bps)
slippage_bps: 0.0    # keep 0 for now
initial_cash: 10000

strategies:
  ma_crossover:
    fast: 20
    slow: 50
  rsi_mean_reversion:
    period: 14
    buy_below: 30
    sell_above: 70